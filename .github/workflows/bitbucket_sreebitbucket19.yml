name: Trigger Bitbucket Pipeline
on:
  workflow_dispatch: # Manual trigger

jobs:
  trigger-bitbucket:
    runs-on: ubuntu-latest
    steps:
      - name: Call Bitbucket API (Bearer Token Mode)
        run: |
          curl -i -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.BITBUCKET_FIRST_REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.bitbucket.org/2.0/repositories/sreebitbucket19/first_repo/pipelines/" \
            -d '{
              "target": {
                "ref_type": "branch",
                "type": "pipeline_ref_target",
                "ref_name": "main"
              }
            }'

      - name: Install Atlassian CLI
        run: |
          curl -LO "https://acli.atlassian.com/linux/latest/acli_linux_amd64/acli"
          chmod +x ./acli

      - name: Trigger Pipeline
        env:
          # Use your Atlassian API Token and the Email associated with it
          BITBUCKET_FIRST_REPO_TOKEN: ${{ secrets.BITBUCKET_FIRST_REPO_TOKEN }}
          BITBUCKET_EMAIL: cpadmaja2003@gmail.com
        run: |
          # Note: --action triggerPipeline is the standard ACLI syntax
          ./acli bitbucket --action triggerPipeline \
            --workspace "sreebitbucket19" \
            --repository "first_repo" \
            --branch "main" \
            --user "$BITBUCKET_EMAIL" \
            --password "$BITBUCKET_FIRST_REPO_TOKEN"