name: Remote Trigger via Push (All Branches)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  trigger_repo_a:
    runs-on: ubuntu-latest
    steps:
      - name: Mass Branch Trigger via GH CLI
        env:
          # The GitHub CLI automatically uses this token for authentication
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          # 1. Configuration
          TARGET_REPO="aqwertyuiop48/codeforces_script"
          
          # ⚠️ UPDATE THIS: The exact filename of the workflow in the target repo
          WORKFLOW_FILE="your-workflow-file.yml" 
          
          BRANCHES=(
            "main" "javac_" "R_" "bito_" "bito1_" "c_sharp" 
            "clojure_" "clojure_script" "cpp_" "cypress_testing" 
            "cypress_testing_1" "dart_" "elm_" "helidon_java_" 
            "helidon_kotlin_" "julia_" "kotlin1_" "lua_" "main_" "matlab_"
          )

          # 2. Iterate and Trigger using the API
          for branch in "${BRANCHES[@]}"; do
            echo "------------------------------------------------"
            echo "🚀 Triggering $WORKFLOW_FILE on target branch: $branch"
            
            # The gh CLI command that replaces the git clone/push mess
            if gh workflow run "$WORKFLOW_FILE" --repo "$TARGET_REPO" --ref "$branch"; then
                echo "✅ Trigger successfully sent to $branch. Sleeping for 5 seconds..."
                sleep 5
            else
                echo "⚠️ Failed to trigger $branch. (Check if the branch exists or if the filename is correct)."
            fi
          done

          echo "------------------------------------------------"
          echo "🎯 All triggers complete."