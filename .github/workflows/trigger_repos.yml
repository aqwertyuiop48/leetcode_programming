name: Remote Trigger via Push (All Branches & All Workflows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  trigger_repo_a:
    runs-on: ubuntu-latest
    steps:
      - name: Mass Trigger All Workflows on All Branches
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          # 1. Configuration
          TARGET_REPO="aqwertyuiop48/codeforces_script"
          
          BRANCHES=(
            "main" "javac_" "R_" "bito_" "bito1_" "c_sharp" 
            "clojure_" "clojure_script" "cpp_" "cypress_testing" 
            "cypress_testing_1" "dart_" "elm_" "helidon_java_" 
            "helidon_kotlin_" "julia_" "kotlin1_" "lua_" "main_" "matlab_"
          )

          # 2. Fetch all workflow filenames dynamically
          echo "🔍 Fetching all workflows for $TARGET_REPO..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last')
          
          if [ -z "$WORKFLOWS" ]; then
            echo "❌ No workflows found! Exiting."
            exit 1
          fi

          echo "✅ Found workflows:"
          echo "$WORKFLOWS"

          # 3. Iterate through every branch
          for branch in "${BRANCHES[@]}"; do
            echo "================================================"
            echo "🚀 TARGETING BRANCH: $branch"
            echo "================================================"
            
            # 4. Iterate through every workflow for the current branch
            for wf in $WORKFLOWS; do
              echo "  ➡️ Attempting to trigger workflow: $wf"
              
              # Execute the trigger. If it fails (e.g., workflow doesn't exist on that branch), it prints a warning but keeps going.
              if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ Success. Sleeping for 5 seconds..."
                  sleep 5
              else
                  echo "  ⚠️ Skipped: $wf cannot be triggered on $branch (Likely missing workflow_dispatch)."
              fi
            done
          done

          echo "🎯 All triggers complete."