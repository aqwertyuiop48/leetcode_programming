name: Remote Trigger via Push (All Branches & All Workflows)

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  trigger_repo_a:
    runs-on: ubuntu-latest
    steps:
      - name: Mass Trigger All Workflows on All Branches dynamically
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          # 1. Configuration
          TARGET_REPO="aqwertyuiop48/codeforces_script"
          
          # 2. Fetch all branches dynamically
          echo "🔍 Fetching all branches for $TARGET_REPO..."
          # Note: --paginate ensures we get all branches if there are > 30
          BRANCHES=$(gh api --paginate repos/$TARGET_REPO/branches --jq '.[].name')
          
          if [ -z "$BRANCHES" ]; then
            echo "❌ No branches found! Exiting."
            exit 1
          fi
          
          echo "✅ Found branches:"
          echo "$BRANCHES"

          # 3. Fetch all workflow filenames dynamically
          echo "🔍 Fetching all workflows for $TARGET_REPO..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last')
          
          if [ -z "$WORKFLOWS" ]; then
            echo "❌ No workflows found! Exiting."
            exit 1
          fi

          echo "✅ Found workflows:"
          echo "$WORKFLOWS"

          # 4. Iterate through every branch
          for branch in $BRANCHES; do
            echo "================================================"
            echo "🚀 TARGETING BRANCH: $branch"
            echo "================================================"
            
            # 5. Iterate through every workflow for the current branch
            for wf in $WORKFLOWS; do
              echo "  ➡️ Attempting to trigger workflow: $wf"
              
              # Execute the trigger. If it fails, it prints a warning but keeps going.
              if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ Success. Sleeping for 5 seconds..."
                  sleep 5
              else
                  echo "  ⚠️ Skipped: $wf cannot be triggered on $branch (Likely missing workflow_dispatch)."
              fi
            done
          done

          echo "🎯 All triggers complete."