name: Remote Trigger via Push (All Branches)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  trigger_repo_a:
    runs-on: ubuntu-latest
    steps:
      - name: Mass Branch Trigger
        run: |
          # --- SANITY CHECK: IS THE SECRET REACHING THE SCRIPT? ---
          if [ -z "${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}" ]; then
            echo "❌ ERROR: The token secret is EMPTY."
            echo "Go to Settings -> Secrets and variables -> Actions."
            echo "Make sure it is saved under 'Repository secrets' and not 'Environment secrets'."
            exit 1
          else
            echo "✅ Secret is populated. Proceeding..."
          fi

          # 1. Setup Git Identity
          git config --global user.email "aqwertyuiop48@hotmail.com"
          git config --global user.name "aqwertyuiop48"
          
          # Target Repository Configuration
          TARGET_REPO="github.com/aqwertyuiop48/codeforces_script.git"
          
          BRANCHES=(
            "main" "javac_" "R_" "bito_" "bito1_" "c_sharp" 
            "clojure_" "clojure_script" "cpp_" "cypress_testing" 
            "cypress_testing_1" "dart_" "elm_" "helidon_java_" 
            "helidon_kotlin_" "julia_" "kotlin1_" "lua_" "main_" "matlab_"
          )

          # 2. Clone the repo
          git clone https://github.com/aqwertyuiop48/codeforces_script.git repo_dir
          cd repo_dir

          # 3. Force Git to use the token for pushing
          git remote set-url origin https://aqwertyuiop48:${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}@$TARGET_REPO

          # 4. Iterate and Push
          for branch in "${BRANCHES[@]}"; do
            echo "------------------------------------------------"
            echo "🚀 Target: $branch"
            
            if git checkout "$branch"; then
                git commit --allow-empty -m "Remote trigger: $(date)"
                git push origin "$branch"
                
                echo "✅ Triggered $branch. Sleeping for 5 seconds..."
                sleep 5
            else
                echo "⚠️  Branch $branch not found or could not be checked out. Skipping."
            fi
          done

          echo "🎯 All triggers complete."