name: Trigger Bitbucket Pipeline
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Manual trigger

jobs:
  trigger-bitbucket:
    runs-on: ubuntu-latest
    steps:
      - name: Call Bitbucket API (Bearer Token Mode)
        run: |
          curl -i -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.BITBUCKET_FIRST_REPO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.bitbucket.org/2.0/repositories/sreebitbucket19/first_repo/pipelines/" \
            -d '{
              "target": {
                "ref_type": "branch",
                "type": "pipeline_ref_target",
                "ref_name": "main"
              }
            }'

      - name: Install Atlassian CLI
        run: |
          curl -LO "https://acli.atlassian.com/linux/latest/acli_linux_amd64/acli"
          chmod +x ./acli

      - name: Trigger Bitbucket Pipeline
        env:
          BITBUCKET_FIRST_REPO_TOKEN: ${{ secrets.BITBUCKET_FIRST_REPO_TOKEN }}
          BITBUCKET_EMAIL: cpadmaja2003@gmail.com
        run: |
          curl -X POST -is -u "$BITBUCKET_EMAIL:$BITBUCKET_FIRST_REPO_TOKEN" \
            -H 'Content-Type: application/json' \
            "https://api.bitbucket.org/2.0/repositories/sreebitbucket19/first_repo/pipelines/" \
            -d '{
              "target": {
                "ref_type": "branch",
                "type": "pipeline_ref_target",
                "ref_name": "main"
              }
            }'