name: Mass Remote Trigger (Multi-Job Matrix)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  # JOB 1: Triggers the first 20 repositories in parallel batches of 5
  trigger_main_matrix:
    name: Trigger ${{ matrix.repo }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5 
      fail-fast: false
      matrix:
        repo: [
          "aqwertyuiop48/angular-springboot-crud",
          "aqwertyuiop48/http4j_java",
          "aqwertyuiop48/my_angular_app",
          "aqwertyuiop48/nextjs_app",
          "aqwertyuiop48/nextjs_news_search_microservices",
          "aqwertyuiop48/selenium_java",
          "aqwertyuiop48/Expense_Tracker",
          "aqwertyuiop48/testing-samples",
          "aqwertyuiop48/automated-build-android-app-with-github-action",
          "aqwertyuiop48/SeleniumBase",
          "aqwertyuiop48/selenium_python_example",
          "aqwertyuiop48/test-swing11",
          "aqwertyuiop48/upgrad_programming",
          "aqwertyuiop48/vercel_django_example1",
          "aqwertyuiop48/nestjs_app",
          "aqwertyuiop48/express_vercel_app",
          "aqwertyuiop48/nestjs_tsx",
          "aqwertyuiop48/node_server",
          "aqwertyuiop48/hapijs_vercel",
          "aqwertyuiop48/profiles",
          "aqwertyuiop48/Python",
          "aqwertyuiop48/Java",
          "aqwertyuiop48/Kotlin"
        ]

    steps:
      - name: Process Repository
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          echo "🔥 STARTING TRIGGER FOR: $TARGET_REPO"
          echo "🔍 Fetching branches..."
          BRANCHES=$(gh api --paginate repos/$TARGET_REPO/branches --jq '.[].name' 2>/dev/null) || true
          
          if [ -z "$BRANCHES" ]; then
            echo "⚠️ No branches found. Skipping."
            exit 0
          fi

          echo "🔍 Fetching workflows..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last' 2>/dev/null) || true
          
          if [ -z "$WORKFLOWS" ]; then
            echo "⚠️ No workflows found. Skipping."
            exit 0
          fi

          for branch in $BRANCHES; do
            echo "------------------------------------------------"
            echo "🚀 Branch: $branch"
            for wf in $WORKFLOWS; do
              echo "  ➡️ Triggering: $wf"
              if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ Success. Waiting 5s..."
                  sleep 5
              else
                  echo "  ⚠️ Skipped (Check if workflow_dispatch is enabled)."
              fi
            done
          done

  # JOB 2: Waits for all parallel jobs above to complete, then fires the final target
  trigger_programming_languages_last:
    name: Trigger programming_languages (Final)
    runs-on: ubuntu-latest
    needs: trigger_main_matrix
    
    steps:
      - name: Process Final Repository
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
          TARGET_REPO: "aqwertyuiop48/programming_languages"
        run: |
          echo "🔥 STARTING FINAL TRIGGER FOR: $TARGET_REPO"
          echo "🔍 Fetching branches..."
          BRANCHES=$(gh api --paginate repos/$TARGET_REPO/branches --jq '.[].name' 2>/dev/null) || true
          
          if [ -z "$BRANCHES" ]; then
            echo "⚠️ No branches found. Exiting."
            exit 0
          fi

          echo "🔍 Fetching workflows..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last' 2>/dev/null) || true
          
          if [ -z "$WORKFLOWS" ]; then
            echo "⚠️ No workflows found. Exiting."
            exit 0
          fi

          for branch in $BRANCHES; do
            echo "------------------------------------------------"
            echo "🚀 Branch: $branch"
            for wf in $WORKFLOWS; do
              echo "  ➡️ Triggering: $wf"
              if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ Success. Waiting 5s..."
                  sleep 5
              else
                  echo "  ⚠️ Skipped (Check if workflow_dispatch is enabled)."
              fi
            done
          done
          echo "🎯 Finished Final Repo: $TARGET_REPO"

  trigger-render-workflow:
    needs: trigger_programming_languages_last
    if: always()
    name: Trigger Render Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Workflow via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          echo "🚀 Triggering render_.yml downstream..."
          gh workflow run render_.yml \
            --repo aqwertyuiop48/leetcode_programming \
            --ref main
