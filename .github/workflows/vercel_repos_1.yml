name: Mass Remote Trigger (Multi-Job Matrix)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false
      target_repo:
        description: 'Select a specific repository to run (or "ALL" to run everything)'
        required: true
        type: choice
        default: 'ALL'
        options:
          - 'ALL'
          - "aqwertyuiop48/gatsby"
          - "aqwertyuiop48/remix"
          - "aqwertyuiop48/backbone_vercel"
          - "aqwertyuiop48/knockout_vercel"
          - "aqwertyuiop48/ts_node_server"
          - "aqwertyuiop48/ts_express_vercel_app"
          - "aqwertyuiop48/nestjs_js"
          - "aqwertyuiop48/golang_vercel"
          - "aqwertyuiop48/qwik-app"
          - "aqwertyuiop48/nestjs_tsx"
          - "aqwertyuiop48/flask_pythonanywhere"
          - "aqwertyuiop48/fastapi_python"
          - "aqwertyuiop48/apollo_graphql"
          - "aqwertyuiop48/nuxtjs-boilerplate"
          - "aqwertyuiop48/netlify-deploy"
          - "aqwertyuiop48/serverless-adonis"
          - "aqwertyuiop48/nextjs_project"
          - "aqwertyuiop48/serverless-adonis-ts"
          - "aqwertyuiop48/nx-monorepo"
          - "aqwertyuiop48/nextjs-fastapi-starter-1"
          - "aqwertyuiop48/codeforces_web"
          - "aqwertyuiop48/middleman_"
          - "aqwertyuiop48/jekyll1"
          - "aqwertyuiop48/Expense_Tracker"

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL_REPOS='[
            "aqwertyuiop48/gatsby",
            "aqwertyuiop48/remix",
            "aqwertyuiop48/backbone_vercel",
            "aqwertyuiop48/knockout_vercel",
            "aqwertyuiop48/ts_node_server",
            "aqwertyuiop48/ts_express_vercel_app",
            "aqwertyuiop48/nestjs_js",
            "aqwertyuiop48/golang_vercel",
            "aqwertyuiop48/qwik-app",
            "aqwertyuiop48/nestjs_tsx",
            "aqwertyuiop48/flask_pythonanywhere",
            "aqwertyuiop48/fastapi_python",
            "aqwertyuiop48/apollo_graphql",
            "aqwertyuiop48/nuxtjs-boilerplate",
            "aqwertyuiop48/netlify-deploy",
            "aqwertyuiop48/serverless-adonis",
            "aqwertyuiop48/nextjs_project",
            "aqwertyuiop48/serverless-adonis-ts",
            "aqwertyuiop48/nx-monorepo",
            "aqwertyuiop48/nextjs-fastapi-starter-1",
            "aqwertyuiop48/codeforces_web",
            "aqwertyuiop48/middleman_",
            "aqwertyuiop48/jekyll1",
            "aqwertyuiop48/Expense_Tracker"
          ]'
          
          SELECTION="${{ github.event.inputs.target_repo }}"
          
          if [ "$SELECTION" = "ALL" ]; then
            MATRIX_JSON=$(echo "$ALL_REPOS" | jq -c '.')
          else
            MATRIX_JSON=$(jq -n --arg repo "$SELECTION" '[$repo]' | jq -c '.')
          fi
          
          echo "matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT

  trigger_repos:
    needs: setup-matrix
    name: Trigger ${{ matrix.repo }}
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Process Repository
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          echo "🔥 STARTING TRIGGER FOR: $TARGET_REPO"

          # Vercel rate-limit guard: cooldown after every N deployments
          DEPLOY_COUNT=0
          VERCEL_BATCH_SIZE=30          
          VERCEL_COOLDOWN_SECONDS=330   
          INTER_DEPLOY_SLEEP=12         

          throttle() {
            DEPLOY_COUNT=$((DEPLOY_COUNT + 1))
            if [ $((DEPLOY_COUNT % VERCEL_BATCH_SIZE)) -eq 0 ]; then
              echo "⏸️  Vercel cooldown: $DEPLOY_COUNT deploys triggered. Sleeping ${VERCEL_COOLDOWN_SECONDS}s..."
              sleep "$VERCEL_COOLDOWN_SECONDS"
            else
              sleep "$INTER_DEPLOY_SLEEP"
            fi
          }

          # 1. Fetch all branches
          echo "🔍 Fetching branches..."
          BRANCHES=$(gh api --paginate repos/$TARGET_REPO/branches --jq '.[].name' 2>/dev/null) || true
          
          if [ -z "$BRANCHES" ]; then
            echo "⚠️ No branches found. Skipping."
            exit 0 
          fi

          # 2. Fetch all workflows
          echo "🔍 Fetching workflows..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last' 2>/dev/null) || true
          
          if [ -z "$WORKFLOWS" ]; then
            echo "⚠️ No workflows found. Falling back to empty-commit push on all branches."
            
            TMPDIR=$(mktemp -d)
            git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" "$TMPDIR/repo"
            cd "$TMPDIR/repo"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions Bot"
            
            for branch in $BRANCHES; do
              echo "  ➡️ Empty commit on $branch"
              git checkout "$branch" 2>/dev/null || git checkout -b "$branch" "origin/$branch"
              git commit --allow-empty -m "chore: trigger redeploy"
              if git push origin "$branch"; then
                echo "  ✅ Pushed."
                throttle
              else
                echo "  ⚠️ Push failed for $branch"
              fi
            done
            
            cd /
            rm -rf "$TMPDIR"
            exit 0
          fi

          # 3. Double Loop (Branches x Workflows)
          for branch in $BRANCHES; do
            echo "------------------------------------------------"
            echo "🚀 Branch: $branch"
            
            for wf in $WORKFLOWS; do
              echo "  ➡️ Triggering: $wf"
              
              if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ Success."
                  throttle
              else
                  echo "  ⚠️ Skipped (Check if workflow_dispatch is enabled)."
              fi
            done
          done
          echo "🎯 Finished $TARGET_REPO"

      - name: Trigger Remote Workflow via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          gh workflow run vercel_repos_2.yml \
            --repo aqwertyuiop48/leetcode_programming \
            --ref main