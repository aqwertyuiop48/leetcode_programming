name: Remote Trigger via Push (All Branches & All Workflows)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false


permissions:
  contents: read     # Standard read permission is usually enough here
  actions: write     # Needed if you manage B's own workflows, but not strictly needed to trigger A's
  statuses: write

jobs:
  trigger_repo_a:
    runs-on: ubuntu-latest
    steps:

      - name: Trigger Remote Workflow with curl
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/aqwertyuiop48/codeforces_script/actions/workflows/couchbase_.yml/dispatches \
            -d '{"ref":"main"}'


      - name: Mass Trigger All Workflows on All Branches
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          # 1. Configuration
          TARGET_REPO="aqwertyuiop48/codeforces_script"
          
          BRANCHES=(
            "main" "javac_" "R_" "bito_" "bito1_" "c_sharp" 
            "clojure_" "clojure_script" "cpp_" "cypress_testing" 
            "cypress_testing_1" "dart_" "elm_" "helidon_java_" 
            "helidon_kotlin_" "julia_" "kotlin1_" "lua_" "main_" "matlab_"
          )

          gh workflow run couchbase_.yml \
            --repo aqwertyuiop48/codeforces_script \
            --ref main