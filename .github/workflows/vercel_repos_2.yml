name: Mass Remote Trigger (Multi-Job Matrix)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false


permissions:
  contents: read
  actions: write
  statuses: write


jobs:
  trigger_repos:
    # This name will appear in the UI with the specific repo name attached
    name: Trigger ${{ matrix.repo }}
    runs-on: ubuntu-latest
    
    strategy:
      # Serialize jobs to stay under Vercel's ~40-deploys-per-5min soft cap.
      # All matrix jobs deploy to the same Vercel account, so parallelism multiplies the rate.
      max-parallel: 1
      # 'fail-fast: false' ensures one repo failing doesn't kill the whole workflow
      fail-fast: false
      matrix:
        repo: [          
          "aqwertyuiop48/angular-springboot-crud",
          "aqwertyuiop48/spring-boot-angular-15-mysql-example",
          "aqwertyuiop48/vuepress",
          "aqwertyuiop48/zola",
          "aqwertyuiop48/tanstack-start",
          "aqwertyuiop48/vitepress",
          "aqwertyuiop48/storybook",
          "aqwertyuiop48/preact",
          "aqwertyuiop48/parcel",
          "aqwertyuiop48/polymer",
          "aqwertyuiop48/nitro",
          "aqwertyuiop48/ionic-angular",
          "aqwertyuiop48/hydrogen",
          "aqwertyuiop48/hugo",
          "aqwertyuiop48/hono",
          "aqwertyuiop48/hexo",
          "aqwertyuiop48/h3",
          "aqwertyuiop48/elysia",
          "aqwertyuiop48/eleventy",
          "aqwertyuiop48/docusaurus-2",
          "aqwertyuiop48/docusaurus",
          "aqwertyuiop48/saas-microservices",
          "aqwertyuiop48/turborepo-with-hono",
          "aqwertyuiop48/rust-axum",
          "aqwertyuiop48/empathic-voice-interface-starter"
        ]

    steps:
      - name: Process Repository
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          echo "🔥 STARTING TRIGGER FOR: $TARGET_REPO"

          # Vercel rate-limit guard: cooldown after every N deployments
          DEPLOY_COUNT=0
          VERCEL_BATCH_SIZE=30          # deploys before forced cooldown
          VERCEL_COOLDOWN_SECONDS=330   # 5.5 min cooldown
          INTER_DEPLOY_SLEEP=12         # seconds between consecutive deploys

          throttle() {
            DEPLOY_COUNT=$((DEPLOY_COUNT + 1))
            if [ $((DEPLOY_COUNT % VERCEL_BATCH_SIZE)) -eq 0 ]; then
              echo "⏸️  Vercel cooldown: $DEPLOY_COUNT deploys triggered. Sleeping ${VERCEL_COOLDOWN_SECONDS}s..."
              sleep "$VERCEL_COOLDOWN_SECONDS"
            else
              sleep "$INTER_DEPLOY_SLEEP"
            fi
          }

          # 1. Fetch all branches
          echo "🔍 Fetching branches..."
          BRANCHES=$(gh api --paginate repos/$TARGET_REPO/branches --jq '.[].name' 2>/dev/null) || true
          
          if [ -z "$BRANCHES" ]; then
            echo "⚠️ No branches found. Skipping."
            exit 0 # Exit success so the job stays green
          fi

          # 2. Fetch all workflows
          echo "🔍 Fetching workflows..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last' 2>/dev/null) || true
          
          if [ -z "$WORKFLOWS" ]; then
            echo "⚠️ No workflows found. Falling back to empty-commit push on all branches."
            
            TMPDIR=$(mktemp -d)
            git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" "$TMPDIR/repo"
            cd "$TMPDIR/repo"
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions Bot"
            
            for branch in $BRANCHES; do
              echo "  ➡️ Empty commit on $branch"
              git checkout "$branch" 2>/dev/null || git checkout -b "$branch" "origin/$branch"
              git commit --allow-empty -m "chore: trigger redeploy"
              if git push origin "$branch"; then
                echo "  ✅ Pushed."
                throttle
              else
                echo "  ⚠️ Push failed for $branch"
              fi
            done
            
            cd /
            rm -rf "$TMPDIR"
            exit 0
          fi

          # 3. Double Loop (Branches x Workflows)
          for branch in $BRANCHES; do
            echo "------------------------------------------------"
            echo "🚀 Branch: $branch"
            
            for wf in $WORKFLOWS; do
              echo "  ➡️ Triggering: $wf"
              
              if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ Success."
                  throttle
              else
                  echo "  ⚠️ Skipped (Check if workflow_dispatch is enabled)."
              fi
            done
          done
          echo "🎯 Finished $TARGET_REPO"