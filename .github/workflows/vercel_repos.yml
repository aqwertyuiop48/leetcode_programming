name: Mass Remote Trigger (Multi-Job Matrix)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for trigger'
        required: false
      target_repo:
        description: 'Select a specific repository to run (or "ALL" to run everything)'
        required: true
        type: choice
        default: 'ALL'
        options:
          - 'ALL'
          - "aqwertyuiop48/vuejs_training"
          - "aqwertyuiop48/vercel_flask_app"
          - "aqwertyuiop48/my_angular_app"
          - "aqwertyuiop48/nestjs_app"
          - "aqwertyuiop48/nextjs_app"
          - "aqwertyuiop48/my_react_app"
          - "aqwertyuiop48/express_vercel_app"
          - "aqwertyuiop48/vue_project"
          - "aqwertyuiop48/JavaScript-Applications"
          - "aqwertyuiop48/solid_app"
          - "aqwertyuiop48/ionic_app"
          - "aqwertyuiop48/whatsapp-2"
          - "aqwertyuiop48/jspaint"
          - "aqwertyuiop48/Video-Meeting"
          - "aqwertyuiop48/google-translate-clone"
          - "aqwertyuiop48/codepen"
          - "aqwertyuiop48/vercel_django_example1"
          - "aqwertyuiop48/koa_project"
          - "aqwertyuiop48/hapijs_vercel"
          - "aqwertyuiop48/python_server"
          - "aqwertyuiop48/node_server"
          - "aqwertyuiop48/brunch"
          - "aqwertyuiop48/stencil"
          - "aqwertyuiop48/umijs"
          - "aqwertyuiop48/ember"
          - "aqwertyuiop48/nextjs_news_search_microservices"
          - "aqwertyuiop48/svelte"
          - "aqwertyuiop48/xmcp"

permissions:
  contents: read
  actions: write
  statuses: write

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          ALL_REPOS='[
            "aqwertyuiop48/vuejs_training",
            "aqwertyuiop48/vercel_flask_app",
            "aqwertyuiop48/my_angular_app",
            "aqwertyuiop48/nestjs_app",
            "aqwertyuiop48/nextjs_app",
            "aqwertyuiop48/my_react_app",
            "aqwertyuiop48/express_vercel_app",
            "aqwertyuiop48/vue_project",
            "aqwertyuiop48/JavaScript-Applications",
            "aqwertyuiop48/solid_app",
            "aqwertyuiop48/ionic_app",
            "aqwertyuiop48/whatsapp-2",
            "aqwertyuiop48/jspaint",
            "aqwertyuiop48/Video-Meeting",
            "aqwertyuiop48/google-translate-clone",
            "aqwertyuiop48/codepen",
            "aqwertyuiop48/vercel_django_example1",
            "aqwertyuiop48/koa_project",
            "aqwertyuiop48/hapijs_vercel",
            "aqwertyuiop48/python_server",
            "aqwertyuiop48/node_server",
            "aqwertyuiop48/brunch",
            "aqwertyuiop48/stencil",
            "aqwertyuiop48/umijs",
            "aqwertyuiop48/ember",
            "aqwertyuiop48/nextjs_news_search_microservices",
            "aqwertyuiop48/svelte",
            "aqwertyuiop48/xmcp"
          ]'
          
          SELECTION="${{ github.event.inputs.target_repo }}"
          
          if [ "$SELECTION" = "ALL" ]; then
            MATRIX_JSON=$(echo "$ALL_REPOS" | jq -c '.')
          else
            MATRIX_JSON=$(jq -n --arg repo "$SELECTION" '[$repo]' | jq -c '.')
          fi
          
          echo "matrix=${MATRIX_JSON}" >> $GITHUB_OUTPUT

  trigger_repos:
    needs: setup-matrix
    name: Trigger ${{ matrix.repo }}
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Process Repository
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          echo "🔥 STARTING TRIGGER FOR: $TARGET_REPO"
          DEPLOY_COUNT=0
          VERCEL_BATCH_SIZE=30          
          VERCEL_COOLDOWN_SECONDS=330   
          INTER_DEPLOY_SLEEP=12         
          throttle() {
            DEPLOY_COUNT=$((DEPLOY_COUNT + 1))
            if [ $((DEPLOY_COUNT % VERCEL_BATCH_SIZE)) -eq 0 ]; then
              echo "⏸️  Vercel cooldown: $DEPLOY_COUNT deploys triggered. Sleeping ${VERCEL_COOLDOWN_SECONDS}s..."
              sleep "$VERCEL_COOLDOWN_SECONDS"
            else
              sleep "$INTER_DEPLOY_SLEEP"
            fi
          }
          
          echo "🔍 Fetching branches..."
          BRANCHES=$(gh api --paginate repos/$TARGET_REPO/branches --jq '.[].name' 2>/dev/null) || true
          
          if [ -z "$BRANCHES" ]; then
            echo "⚠️ No branches found. Skipping."
            exit 0 
          fi
          
          echo "🔍 Fetching workflows..."
          WORKFLOWS=$(gh api repos/$TARGET_REPO/actions/workflows --jq '.workflows[].path | split("/") | last' 2>/dev/null) || true
          
          echo "📦 Cloning repo for empty commits..."
          TMPDIR=$(mktemp -d)
          git clone --quiet "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO}.git" "$TMPDIR/repo"
          cd "$TMPDIR/repo"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions Bot"
          
          for branch in $BRANCHES; do
            echo "------------------------------------------------"
            echo "🚀 Branch: $branch"
            
            echo "  ➡️ Pushing empty commit..."
            git checkout "$branch" 2>/dev/null || git checkout -b "$branch" "origin/$branch"
            git commit --allow-empty -m "chore: trigger redeploy"
            if git push origin "$branch"; then
              echo "  ✅ Pushed. (Triggers Vercel + any push workflows)"
              throttle
            else
              echo "  ⚠️ Push failed for $branch"
            fi
            
            if [ -n "$WORKFLOWS" ]; then
              for wf in $WORKFLOWS; do
                echo "  ➡️ Triggering workflow_dispatch: $wf"
                if gh workflow run "$wf" --repo "$TARGET_REPO" --ref "$branch"; then
                  echo "  ✅ workflow_dispatch triggered."
                  throttle
                else
                  echo "  ⚠️ Skipped (workflow_dispatch not enabled or failed)."
                fi
              done
            fi
          done
          
          cd /
          rm -rf "$TMPDIR"
          echo "🎯 Finished $TARGET_REPO"

      - name: Trigger Remote Workflow via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.TRIGGER_PAT_AQWERTYUIOP48 }}
        run: |
          gh workflow run vercel_repos_1.yml \
            --repo aqwertyuiop48/leetcode_programming \
            --ref main
